<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡聰明 | CardSmart</title>
    <!-- 引入 Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 1. 全域顏色變數定義（參考卡省 App 與極簡設計） */
        :root {
            /* 預設深色版 (Dark Mode) */
            --bg-main: #0B0B0C;
            --bg-card: #161618;
            --bg-input: #1C1C1E;
            --border-color: #2C2C2E;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --primary: #34C759; /* 卡省綠 */
            --accent: #2F80ED;  /* 精緻藍 */
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            /* 淺色版 (Light Mode) */
            --bg-main: #F4F4F6;
            --bg-card: #FFFFFF;
            --bg-input: #E5E5EA;
            --border-color: #E5E5EA;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --primary: #248A3D;
            --accent: #007AFF;
            --shadow-color: rgba(0, 0, 0, 0.05);
        }

        /* 2. 基礎綁定與流暢動畫 */
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            margin: 0;
            padding: 0;
        }

        /* 3. 強制 RWD 修正：讓主區塊最大維持手機寬度，完美置中 */
        main {
            width: 100% !important;
            max-width: 480px !important;
            margin-left: auto !important;
            margin-right: auto !important;
            padding-left: 16px !important;
            padding-right: 16px !important;
            box-sizing: border-box !important;
        }
        
        header .max-w-md {
            max-width: 480px !important;
            margin: 0 auto !important;
        }

        /* 4. 元件核心樣式 */
        .custom-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .custom-input, .custom-select, .custom-textarea {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .custom-input:focus, .custom-select:focus, .custom-textarea:focus {
            border-color: var(--accent);
            background-color: var(--bg-card);
        }

        .text-muted {
            color: var(--text-muted);
        }
    </style>
</head>
<body class="min-h-screen pb-20 antialiased">

    <!-- 右上角精緻的深淺色切換鈕 -->
    <div class="fixed top-4 right-4 z-50">
        <button id="themeToggle" class="custom-card text-xs font-medium px-3 py-1.5 rounded-full cursor-pointer transition active:scale-95 flex items-center gap-1.5">
            <span id="themeIcon">🌙</span> <span id="themeText">深色模式</span>
        </button>
    </div>

    <!-- 頁首：App 化極簡標題列 -->
    <header class="p-6 sticky top-0 z-40 backdrop-blur-md bg-[var(--bg-main)]/80 border-b border-[var(--border-color)]">
        <div class="max-w-md mx-auto flex justify-between items-end">
            <div>
                <span class="text-xs font-semibold tracking-wider text-[var(--accent)] uppercase">CardSmart App</span>
                <h1 class="text-2xl font-black tracking-tight mt-0.5">卡聰明</h1>
            </div>
            <span class="text-[10px] font-mono border border-[var(--border-color)] px-2 py-0.5 rounded-md text-muted">2026.H2</span>
        </div>
    </header>

    <!-- 主區塊 -->
    <main class="space-y-6 pt-4">

        <!-- 區塊一：消費試算 -->
        <section class="custom-card p-5 rounded-2xl transition">
            <h2 class="text-base font-bold mb-4 flex items-center gap-2">
                <span class="p-1 rounded-lg bg-[var(--accent)]/10 text-[var(--accent)] text-sm">🔍</span>
                哪張卡最划算？
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-muted mb-1.5">消費金額 (TWD)</label>
                    <input type="number" id="spendAmount" placeholder="請輸入金額，例如：1000" class="custom-input w-full p-3 rounded-xl text-sm focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-medium text-muted mb-1.5">消費類別</label>
                    <select id="spendCategory" class="custom-select w-full p-3 rounded-xl text-sm focus:outline-none transition cursor-pointer">
                        <option value="general">💼 一般消費</option>
                        <option value="restaurant">🍕 餐飲美食</option>
                        <option value="online">📱 網路購物</option>
                        <option value="travel">✈️ 旅遊交通</option>
                    </select>
                </div>
                <button onclick="calculateBestCard()" class="w-full bg-[var(--accent)] hover:opacity-90 text-white font-bold py-3 rounded-xl transition shadow-md active:scale-[0.99] cursor-pointer text-sm">
                    立即試算最佳回饋
                </button>
            </div>
            <div id="calcResult" class="mt-4 p-4 bg-[var(--accent)]/5 rounded-xl hidden border border-[var(--accent)]/20 text-sm"></div>
        </section>

        <!-- 區塊二：AI 消費顧問 -->
        <section class="custom-card p-5 rounded-2xl relative overflow-hidden">
            <h2 class="text-base font-bold mb-1 flex items-center gap-2">
                <span class="p-1 rounded-lg bg-purple-500/10 text-purple-400 text-sm">🤖</span>
                AI 消費顧問
            </h2>
            <p class="text-[11px] text-muted mb-4">輸入你的消費習慣，讓 Cloudflare Workers AI 幫你做最佳規劃。</p>
            <div class="space-y-3">
                <textarea id="aiPrompt" rows="3" placeholder="例如：我每個月通勤費約 2000 元，喜歡網購，請推薦我怎麼分配卡片？" class="custom-textarea w-full p-3 rounded-xl text-sm focus:outline-none transition leading-relaxed"></textarea>
                <button onclick="askAIConsultant()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition shadow-md active:scale-[0.99] cursor-pointer text-sm">
                    詢問 AI 顧問
                </button>
            </div>
            <div id="aiResult" class="mt-4 p-4 bg-white/5 rounded-xl hidden border border-white/10 text-sm leading-relaxed whitespace-pre-line"></div>
        </section>

        <!-- 區塊三：我的卡片庫 -->
        <section class="custom-card p-5 rounded-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-base font-bold flex items-center gap-2">
                    <span class="p-1 rounded-lg bg-[var(--primary)]/10 text-[var(--primary)] text-sm">💳</span>
                    我的卡片庫
                </h2>
                <button onclick="toggleCardForm()" id="addBtn" class="text-xs bg-[var(--primary)]/10 text-[var(--primary)] px-3 py-1.5 rounded-lg font-bold hover:bg-[var(--primary)]/20 transition cursor-pointer">+ 新增卡片</button>
            </div>
            
            <div id="cardForm" class="hidden mb-5 p-4 rounded-xl border border-[var(--border-color)] bg-[var(--bg-input)] space-y-3">
                <input type="text" id="cardName" placeholder="卡片/銀行名稱" class="w-full p-2.5 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-lg text-sm text-[var(--text-main)] focus:outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="generalRate" placeholder="一般回饋 %" class="p-2.5 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-lg text-sm text-[var(--text-main)] focus:outline-none">
                    <input type="number" id="specialRate" placeholder="特仕回饋 %" class="p-2.5 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-lg text-sm text-[var(--text-main)] focus:outline-none">
                </div>
                <input type="text" id="cardNote" placeholder="備註（例如：網購上限 300）" class="w-full p-2.5 bg-[var(--bg-card)] border border-[var(--border-color)] rounded-lg text-sm text-[var(--text-main)] focus:outline-none">
                <button onclick="saveCard()" class="w-full bg-[var(--primary)] text-white py-2 rounded-lg text-sm font-bold cursor-pointer transition hover:opacity-90">儲存此卡片</button>
            </div>

            <div id="cardsList" class="space-y-3">
                <p class="text-xs text-muted text-center py-6">正在同步 Cloudflare D1 資料庫...</p>
            </div>
        </section>

    </main>

    <script>
        // --- 深淺色模式切換邏輯 ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        themeToggle.addEventListener('click', () => {
            const isLight = document.body.getAttribute('data-theme') === 'light';
            if (isLight) {
                document.body.removeAttribute('data-theme');
                themeIcon.innerText = '🌙';
                themeText.innerText = '深色模式';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.innerText = '☀️';
                themeText.innerText = '淺色模式';
            }
        });

        // 頁面載入時自動抓取卡片
        document.addEventListener('DOMContentLoaded', loadCards);

        function toggleCardForm() {
            const form = document.getElementById('cardForm');
            const btn = document.getElementById('addBtn');
            form.classList.toggle('hidden');
            if(form.classList.contains('hidden')) {
                btn.innerText = "+ 新增卡片";
            } else {
                btn.innerText = "取消關閉";
            }
        }

        // 1. 撈取資料庫所有的卡片
        async function loadCards() {
            try {
                const res = await fetch('/api/cards');
                const cards = await res.json();
                const list = document.getElementById('cardsList');
                
                if (cards.length === 0) {
                    list.innerHTML = '<p class="text-muted text-center py-6 text-xs">目前卡片庫空空如也，請先新增卡片。</p>';
                    return;
                }
                
                window.myCards = cards; 
                list.innerHTML = cards.map((c, index) => {
                    const gradients = [
                        'from-emerald-500 to-teal-600',
                        'from-blue-500 to-indigo-600',
                        'from-purple-500 to-pink-600',
                        'from-amber-500 to-orange-600'
                    ];
                    const grad = gradients[index % gradients.length];

                    return `
                        <div class="p-4 bg-[var(--bg-input)] rounded-xl border border-[var(--border-color)] flex justify-between items-center transition hover:border-gray-500">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-6 rounded bg-gradient-to-br ${grad} opacity-80 shadow-inner hidden sm:block"></div>
                                <div>
                                    <div class="font-bold text-sm tracking-wide">${c.card_name}</div>
                                    <div class="text-[11px] text-muted mt-0.5">
                                        一般: <span class="text-[var(--text-main)] font-semibold">${c.general_rate}%</span> | 
                                        特仕: <span class="text-[var(--primary)] font-semibold">${c.special_rate}%</span>
                                    </div>
                                    ${c.note ? `<div class="text-[10px] text-gray-400 mt-1 bg-black/10 dark:bg-white/5 px-1.5 py-0.5 rounded inline-block">${c.note}</div>` : ''}
                                </div>
                            </div>
                            <button onclick="deleteCard(${c.id})" class="text-xs text-red-400 hover:text-red-500 font-medium cursor-pointer p-1.5 rounded transition hover:bg-red-500/10">刪除</button>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('cardsList').innerHTML = '<p class="text-red-500 text-center py-4 text-xs">❌ 資料載入失敗</p>';
            }
        }

        // 2. 新增卡片到資料庫
        async function saveCard() {
            const card_name = document.getElementById('cardName').value;
            const general_rate = parseFloat(document.getElementById('generalRate').value) || 0;
            const special_rate = parseFloat(document.getElementById('specialRate').value) || 0;
            const note = document.getElementById('cardNote').value;

            if (!card_name) return alert('請填寫卡片名稱');

            await fetch('/api/cards', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ card_name, general_rate, special_rate, note })
            });

            document.getElementById('cardName').value = '';
            document.getElementById('generalRate').value = '';
            document.getElementById('specialRate').value = '';
            document.getElementById('cardNote').value = '';
            toggleCardForm();
            loadCards();
        }

        // 3. 刪除卡片
        async function deleteCard(id) {
            if (!confirm('確定要刪除這張卡片嗎？')) return;
            await fetch(`/api/cards?id=${id}`, { method: 'DELETE' });
            loadCards();
        }

        // 4. 本地核心消費試算邏輯
        function calculateBestCard() {
            const amount = parseFloat(document.getElementById('spendAmount').value);
            const category = document.getElementById('spendCategory').value;
            const resultBox = document.getElementById('calcResult');
            
            if (!amount) return alert('請輸入金額');
            if (!window.myCards || window.myCards.length === 0) {
                return alert('請先在下方卡片庫新增卡片資料喔！');
            }

            let bestCard = null;
            let maxReward = -1;

            window.myCards.forEach(card => {
                const rate = (category === 'general') ? card.general_rate : card.special_rate;
                const reward = (amount * rate) / 100;
                if (reward > maxReward) {
                    maxReward = reward;
                    bestCard = card;
                }
            });

            const currentRate = category === 'general' ? bestCard.general_rate : bestCard.special_rate;

            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `
                <div class="font-bold text-[var(--accent)] flex items-center gap-1">💡 最佳刷卡建議：</div>
                <div class="mt-2 text-sm">推薦使用 <span class="font-black text-base border-b-2 border-[var(--primary)] pb-0.5 text-[var(--text-main)]">【${bestCard.card_name}】</span></div>
                <div class="text-xs text-muted mt-2">預估可拿回饋：<span class="font-black text-sm text-[var(--primary)]">${maxReward.toFixed(1)}</span> 元</div>
                <div class="text-[11px] text-gray-400 mt-1">此類別回饋率約為 ${currentRate}%</div>
            `;
        }

        // 5. 串接 Workers AI 顧問
        async function askAIConsultant() {
            const prompt = document.getElementById('aiPrompt').value;
            const resultBox = document.getElementById('aiResult');
            if (!prompt) return alert('請輸入你想問的問題');

            resultBox.classList.remove('hidden');
            resultBox.innerHTML = `<span class="inline-block animate-pulse text-xs text-purple-400">⏳ AI 顧問正在調閱 2026 最新大數據回饋資料，請稍候...</span>`;

            try {
                const res = await fetch('/api/advisor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, cards: window.myCards || [] })
                });
                const data = await res.json();
                resultBox.innerHTML = `<strong class="text-purple-400">🤖 AI 顧問的精準分析：</strong><br><div class="mt-2 text-xs text-gray-200">${data.answer}</div>`;
            } catch (err) {
                resultBox.innerHTML = `❌ 顧問暫時離線，請等等再試。`;
            }
        }
    </script>
</body>
</html>
