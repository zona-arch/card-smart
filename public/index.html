<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardGini - Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0B0C10; color: #FFFFFF; font-family: -apple-system, sans-serif; }
        .glass-panel { background: rgba(22, 23, 30, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.03); }
    </style>
</head>
<body class="bg-[#0B0C10] min-h-screen pb-24">
    <div class="max-w-md mx-auto px-5 pt-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-[#FF9800] tracking-wide">Card<span class="text-white">Gini</span></h1>
                <p class="text-[10px] text-gray-500 tracking-wider">Smart Spending, Elite Saving</p>
            </div>
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-pink-500 flex items-center justify-center text-xs font-bold shadow-lg shadow-pink-500/20">G</div>
        </div>

        <!-- 總覽數據小卡 -->
        <div class="glass-panel p-5 rounded-2xl mb-5 shadow-inner relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-28 h-28 bg-[#FF9800]/10 rounded-full blur-2xl"></div>
            <p class="text-xs text-gray-400 mb-1">本月已透過 AI 省下</p>
            <h2 class="text-3xl font-black text-[#00F5D4] tracking-tight">$1,480 <span class="text-xs font-normal text-gray-400">TWD</span></h2>
            <div class="mt-4 pt-4 border-t border-gray-800/60 flex justify-between text-center text-xs">
                <div><p class="text-gray-500 mb-0.5">已綁定卡片</p><p class="font-bold text-white text-sm">4 張</p></div>
                <div><p class="text-gray-500 mb-0.5">最常使用通路</p><p class="font-bold text-white text-sm">蝦皮購物</p></div>
                <div><p class="text-gray-500 mb-0.5">平均回饋率</p><p class="font-bold text-[#FF9800] text-sm">3.8 %</p></div>
            </div>
        </div>

        <!-- 捷徑區 -->
        <h3 class="text-xs font-bold tracking-wider text-gray-500 uppercase mb-3">快捷功能</h3>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <a href="search.html" class="glass-panel p-4 rounded-xl flex items-center gap-3 hover:border-[#00F5D4]/40 transition group">
                <div class="p-2 bg-[#00F5D4]/10 rounded-lg text-[#00F5D4] group-hover:scale-105 transition"><i data-lucide="search" class="w-5 h-5"></i></div>
                <div><p class="text-sm font-semibold">搜尋店家</p><p class="text-[10px] text-gray-400">查哪張卡最頂</p></div>
            </a>
            <a href="add-card.html" class="glass-panel p-4 rounded-xl flex items-center gap-3 hover:border-[#FF9800]/40 transition group">
                <div class="p-2 bg-[#FF9800]/10 rounded-lg text-[#FF9800] group-hover:scale-105 transition"><i data-lucide="plus-circle" class="w-5 h-5"></i></div>
                <div><p class="text-sm font-semibold">新增卡片</p><p class="text-[10px] text-gray-400">拍照/貼上權益</p></div>
            </a>
        </div>

        <!-- 推薦動態 -->
        <h3 class="text-xs font-bold tracking-wider text-gray-500 uppercase mb-3">AI 每日神卡碎念</h3>
        <div class="glass-panel p-4 rounded-xl flex gap-3 items-start relative border-l-2 border-[#00F5D4]">
            <div class="mt-0.5 text-[#00F5D4]"><i data-lucide="sparkles" class="w-4 h-4 animate-pulse"></i></div>
            <p class="text-xs text-gray-300 leading-relaxed">
                「主人，今天便利商店有特別加碼喔！如果去 <span class="text-[#FF9800] font-medium">7-11</span> 記得刷妳新上傳的國泰卡，綁定 Apple Pay 實測回饋拿滿有 10% 喔！」
            </p>
        </div>
    </div>

    <!-- 全局導航欄 -->
    <div id="nav-placeholder"></div>
</body>
<script>
    // 注入全域底部導航
    document.getElementById('nav-placeholder').innerHTML = `
    <div class="fixed bottom-0 left-0 right-0 bg-[#0B0C10]/90 backdrop-blur-md border-t border-[#1F2833] py-2 z-50">
        <div class="max-w-md mx-auto flex justify-around items-center text-gray-500 text-[10px]">
            <a href="index.html" class="flex flex-col items-center gap-1 text-[#FF9800]"><i data-lucide="home" class="w-5 h-5 text-[#FF9800]"></i>Overview</a>
            <a href="search.html" class="flex flex-col items-center gap-1"><i data-lucide="search" class="w-5 h-5"></i>Search</a>
            <a href="cards.html" class="flex flex-col items-center gap-1"><i data-lucide="credit-card" class="w-5 h-5"></i>Credit Cards</a>
            <a href="#" class="flex flex-col items-center gap-1 opacity-40 cursor-not-allowed"><i data-lucide="landmark" class="w-5 h-5"></i>Bank Rate</a>
            <a href="#" class="flex flex-col items-center gap-1 opacity-40 cursor-not-allowed"><i data-lucide="settings" class="w-5 h-5"></i>Settings</a>
        </div>
    </div>`;
    lucide.createIcons();
</script>
</html>
