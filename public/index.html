<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardgini - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#020205] flex justify-center items-center min-h-screen p-4">

    <div class="w-[393px] h-[852px] rounded-[44px] bg-gradient-to-b from-[#0B0E14] to-[#110A25] text-white overflow-hidden shadow-2xl relative flex flex-col border border-white/10">
        
        <!-- HEADER -->
        <header class="flex w-[393px] pt-6 px-6 pb-4 justify-between items-center bg-[#0C0E15]/40 backdrop-blur-[5px] sticky top-0 z-50 border-b border-white/5">
            <div class="flex flex-col gap-1">
                <img src="logo.png" alt="Cardgini Logo" class="w-[111px] h-[24px] object-contain">
                <span class="text-[12px] text-[#8A99AD]">Smart Spending, Elite Saving</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 flex flex-col gap-[22px] pt-3 px-6">
            <section class="flex flex-col gap-1.5 mt-2">
                <h1 class="text-2xl font-bold text-white">Hello, Zona 👋</h1>
                <p class="text-xs text-[#8A99AD]">今天想賺取多少刷卡回饋呢？🔥</p>
            </section>

            <!-- 智慧引導區 -->
            <section class="flex flex-col gap-3">
                <div class="bg-[#161E2E]/60 backdrop-blur-[10px] rounded-[24px] p-5 border border-white/5 flex flex-col gap-4">
                    <h3 class="text-sm font-bold text-orange-500">⚡️ 快速神算精算入口</h3>
                    <p class="text-xs text-zinc-400 leading-relaxed">我們已經為您的應用程式裝上了 LocalStorage 在地資料庫大腦！現在點擊下方按鈕即可開始精算。</p>
                    
                    <button onclick="window.location.href='search.html'" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 h-11 rounded-xl text-center text-xs font-bold text-white shadow-lg active:scale-95 transition-transform">
                        立即前往 Search 頁面體驗真搜尋
                    </button>
                </div>
            </section>
        </div>

        <!-- FOOTER NAV -->
        <footer class="flex h-[72px] px-4 justify-between items-center bg-[#161E2E]/80 backdrop-blur-[10px] border-t border-white/5 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex w-[72px] flex-col items-center gap-1 text-orange-500"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[10px] font-semibold">Overview</span><div class="w-4 h-[2px] bg-orange-500 rounded-full"></div></button>
            <button onclick="window.location.href='search.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]"><i data-lucide="search" class="w-5 h-5"></i><span class="text-[10px]">Search</span></button>
            <button onclick="window.location.href='cards.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]"><i data-lucide="credit-card" class="w-5 h-5"></i><span class="text-[10px]">Cards</span></button>
        </footer>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
