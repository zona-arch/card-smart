<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardgini - Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#020205] flex justify-center items-center min-h-screen p-4">

    <div class="w-[393px] h-[852px] rounded-[44px] bg-gradient-to-b from-[#0B0E14] to-[#110A25] text-white overflow-hidden shadow-2xl relative flex flex-col border border-white/10">
        
        <!-- FIXED HEADER -->
        <header class="flex w-[393px] pt-6 px-6 pb-4 justify-between items-center bg-[#0C0E15]/40 backdrop-blur-[5px] sticky top-0 z-50 border-b border-white/5">
            <div class="flex flex-col gap-1">
                <img src="logo.png" alt="Cardgini Logo" class="w-[111px] h-[24px] object-contain">
                <span class="text-[12px] text-[#8A99AD]">Smart Spending, Elite Saving</span>
            </div>
            <div class="w-10 h-10 rounded-full border border-cyan-400/30 shadow-[0_6px_16px_-6px_rgba(0,240,255,0.4)] overflow-hidden bg-slate-800 flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-cyan-400"></i>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 flex flex-col gap-[22px] pt-3 animate-fade-in">
            <section class="flex justify-between items-center px-6">
                <h1 class="text-lg font-bold text-white">我的卡片</h1>
                <button onclick="window.location.href='add-card.html'" class="bg-[#161E2E]/60 flex items-center gap-1 px-4 py-2 rounded-full border border-orange-500 text-orange-500 text-sm font-semibold hover:bg-orange-500/10 transition-all shadow-[0_0_12px_rgba(255,131,0,0.2)]">
                    <span>+ 新增</span>
                </button>
            </section>

            <section class="px-4 flex flex-col gap-4">
                <!-- 卡片 1 (台新 FlyGo) -->
                <div class="bg-[#161E2E]/60 p-4 rounded-[20px] border border-white/5 flex flex-col gap-3">
                    <div class="flex items-center gap-3">
                        <div class="w-14 h-9 rounded-md bg-gradient-to-tr from-purple-500 to-indigo-600 p-2 flex flex-col justify-between">
                            <div class="w-2.5 h-2 bg-yellow-400 rounded-sm"></div>
                            <span class="text-[5px] font-extrabold text-white text-right">Mastercard</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-sm font-bold">台新 FlyGo 卡</span>
                            <span class="text-[10px] text-[#8A99AD]">Mastercard</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center text-xs text-[#8A99AD]">
                        <span>上限: NT$ 50,000 / 月</span>
                        <div class="flex gap-1">
                            <span class="bg-white/5 px-2 py-0.5 rounded text-[9px] text-white">line pay</span>
                            <span class="bg-white/5 px-2 py-0.5 rounded text-[9px] text-white">Apple Pay</span>
                        </div>
                    </div>
                    <div class="text-xs text-white/80 bg-white/5 p-2 rounded-lg border border-white/5">
                        💡 目前最頂：LINE Pay 通路享 3% 回饋無上限
                    </div>
                </div>
            </section>
        </div>

        <!-- FIXED FOOTER NAV -->
        <footer class="flex h-[72px] px-4 justify-between items-center bg-[#161E2E]/80 backdrop-blur-[10px] border-t border-white/5 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Overview</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <button onclick="window.location.href='search.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Search</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <button onclick="window.location.href='cards.html'" class="flex w-[72px] flex-col items-center gap-1 text-orange-500">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span class="text-[10px] font-semibold">Cards</span>
                <div class="w-4 h-[2px] bg-orange-500 rounded-full"></div>
            </button>
            <button class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] opacity-40 cursor-not-allowed"><i data-lucide="landmark" class="w-5 h-5"></i><span class="text-[10px] font-medium">Rates</span></button>
            <button class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] opacity-40 cursor-not-allowed"><i data-lucide="settings" class="w-5 h-5"></i><span class="text-[10px] font-medium">Settings</span></button>
        </footer>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
