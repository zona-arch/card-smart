<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardGini - Credit Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020205; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-bg { background: linear-gradient(180deg, #0C0E14 0%, #0E0B1E 50%, #07050F 100%); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-2 select-none">

    <div class="w-[393px] h-[852px] rounded-[50px] app-bg text-white overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.8)] relative flex flex-col border border-zinc-800">
        
        <!-- HEADER -->
        <header class="flex w-full pt-6 px-6 pb-3 justify-between items-center bg-[#0C0E15]/60 backdrop-blur-md sticky top-0 z-40">
            <div class="flex flex-col">
                <div class="flex items-baseline gap-0.5">
                    <span class="text-2xl font-extrabold text-orange-500 tracking-wide">C</span>
                    <span class="text-xl font-bold text-white tracking-wide -ml-0.5">ardGini</span>
                </div>
                <span class="text-[10px] text-[#5A6E85] tracking-wider font-medium mt-0.5">Smart Spending, Elite Saving</span>
            </div>
            <div class="w-9 h-9 rounded-full border border-orange-400/40 bg-[#FFF9E6] overflow-hidden flex items-center justify-center shadow-lg">
                <span class="text-lg">⚡️</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-28 pt-2 flex flex-col gap-4">
            <div class="flex justify-between items-center px-1 mt-1">
                <h1 class="text-xl font-bold tracking-wide">我的卡片</h1>
                <button onclick="window.location.href='add-card.html'" class="bg-[#1C1612] border border-orange-500/50 text-orange-400 text-xs font-bold px-3 py-1.5 rounded-full hover:bg-orange-500/10 transition-colors">
                    + 新增卡片
                </button>
            </div>

            <div id="figma-cards-list" class="flex flex-col gap-4">
                <!-- JS 動態生成區 -->
            </div>
        </div>

        <!-- FOOTER NAV -->
        <footer class="flex h-[76px] px-2 justify-between items-center bg-[#07050F]/95 backdrop-blur-xl border-t border-zinc-900 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="home" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Overview</span></button>
            <button onclick="window.location.href='search.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="search" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Search</span></button>
            <button onclick="window.location.href='cards.html'" class="flex flex-col items-center gap-1 w-16 text-orange-500"><i data-lucide="credit-card" class="w-[22px] h-[22px]"></i><span class="text-[9px] font-bold">Credit Cards</span><div class="w-4 h-[2px] bg-orange-500 rounded-full mt-0.5"></div></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="landmark" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Bank Rate</span></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="settings" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Settings</span></button>
        </footer>
    </div>

    <script>
        function renderFigmaWallet() {
            const container = document.getElementById('figma-cards-list');
            const db = JSON.parse(localStorage.getItem('figma_wallet')) || [];

            if (db.length === 0) {
                container.innerHTML = `
                    <div class="bg-[#12121A]/60 border border-zinc-800 rounded-3xl p-8 text-center text-xs text-zinc-500 flex flex-col items-center gap-2 mt-4">
                        <i data-lucide="credit-card" class="w-8 h-8 opacity-20"></i>
                        <span>皮夾內尚無卡片，請點右上角新增！</span>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = "";
            db.forEach(card => {
                const cardImgSrc = card.image !== "default" ? card.image : "https://images.unsplash.com/photo-1613243555988-441166d4d6fd?w=150&auto=format&fit=crop&q=60";
                
                // 動態生成通路權益晶片標籤
                const benefitsHtml = card.benefits.map(b => 
                    `<span class="bg-[#1C1F2A] border border-zinc-800 text-zinc-300 text-[10px] px-2 py-0.5 rounded-md">${b.channel} <b class="text-[#00F3A2]">${b.rate}%</b></span>`
                ).join('');

                const cardBox = document.createElement('div');
                cardBox.className = "bg-[#111422]/90 border border-zinc-800/80 rounded-[24px] p-4 flex flex-col gap-3 relative shadow-xl";
                
                cardBox.innerHTML = `
                    <div class="flex gap-3 items-center">
                        <div class="w-[80px] h-[50px] rounded-lg overflow-hidden border border-zinc-700/50 bg-zinc-900 flex-shrink-0">
                            <img src="${cardImgSrc}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex flex-col flex-1">
                            <h3 class="text-sm font-bold text-white">${card.name}</h3>
                            <span class="text-[10px] text-zinc-500">${card.org} • 上限 NT$ ${card.limit}</span>
                        </div>
                        <button onclick="deleteFigmaCard(${card.id})" class="text-zinc-600 hover:text-rose-400 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>

                    <div class="flex flex-col gap-1.5 pt-2 border-t border-zinc-900">
                        <div class="flex justify-between items-center text-[10px] text-zinc-400">
                            <span>支付工具: <b class="text-orange-400">${card.payTool || '無'}</b></span>
                        </div>
                        <div class="flex flex-wrap gap-1.5 mt-0.5">
                            ${benefitsHtml}
                        </div>
                        ${card.memo ? `<div class="text-[10px] text-zinc-500 mt-1">備註: ${card.memo}</div>` : ''}
                    </div>
                `;
                container.appendChild(cardBox);
            });
            lucide.createIcons();
        }

        function deleteFigmaCard(id) {
            if(!confirm('確定要移除這張卡片嗎？')) return;
            let db = JSON.parse(localStorage.getItem('figma_wallet')) || [];
            db = db.filter(c => c.id !== id);
            localStorage.setItem('figma_wallet', JSON.stringify(db));
            renderFigmaWallet();
        }

        renderFigmaWallet();
    </script>
</body>
</html>
