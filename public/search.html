<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardGini - Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020205; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-bg { background: linear-gradient(180deg, #0C0E14 0%, #0E0B1E 50%, #07050F 100%); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-2 select-none">

    <div class="w-[393px] h-[852px] rounded-[50px] app-bg text-white overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.8)] relative flex flex-col border border-zinc-800">
        
        <!-- HEADER -->
        <header class="flex w-full pt-6 px-6 pb-3 justify-between items-center bg-[#0C0E15]/60 backdrop-blur-md sticky top-0 z-40">
            <div class="flex flex-col">
                <div class="flex items-baseline gap-0.5">
                    <span class="text-2xl font-extrabold text-orange-500 tracking-wide">C</span>
                    <span class="text-xl font-bold text-white tracking-wide -ml-0.5">ardGini</span>
                </div>
                <span class="text-[10px] text-[#5A6E85] tracking-wider font-medium mt-0.5">Smart Spending, Elite Saving</span>
            </div>
            <div class="w-9 h-9 rounded-full border border-orange-400/40 bg-[#FFF9E6] overflow-hidden flex items-center justify-center shadow-lg">
                <span class="text-lg">⚡️</span>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-28 pt-2 flex flex-col gap-4">
            
            <h1 class="text-xl font-bold tracking-wide">通路比較搜尋</h1>

            <div class="flex flex-col gap-2 bg-[#111422] p-4 rounded-2xl border border-zinc-800">
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-zinc-400">選擇消費通路</label>
                    <select id="search-channel" onchange="runSearch()" class="bg-[#0B0E14] h-10 px-3 rounded-xl border border-zinc-800 text-xs text-white focus:outline-none">
                        <!-- 動態填充 -->
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs text-zinc-400">預估消費金額 (NT$)</label>
                    <input type="number" id="search-amt" value="2000" oninput="runSearch()" class="bg-[#0B0E14] h-10 px-3 rounded-xl border border-zinc-800 text-xs text-white focus:outline-none">
                </div>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <h2 class="text-xs font-bold text-zinc-400 px-1">🏆 所有卡片優惠排序</h2>
                <div id="search-results" class="flex flex-col gap-3">
                    <!-- 比較結果清單 -->
                </div>
            </div>
        </div>

        <!-- FOOTER NAV -->
        <footer class="flex h-[76px] px-2 justify-between items-center bg-[#07050F]/95 backdrop-blur-xl border-t border-zinc-900 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="home" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Overview</span></button>
            <button onclick="window.location.href='search.html'" class="flex flex-col items-center gap-1 w-16 text-orange-500"><i data-lucide="search" class="w-[22px] h-[22px]"></i><span class="text-[9px] font-bold">Search</span><div class="w-4 h-[2px] bg-orange-500 rounded-full mt-0.5"></div></button>
            <button onclick="window.location.href='cards.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="credit-card" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Credit Cards</span></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="landmark" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Bank Rate</span></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="settings" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Settings</span></button>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        function initSearchPage() {
            // 修復點 1：改為讀取 figma_wallet
            const db = JSON.parse(localStorage.getItem('figma_wallet')) || [];
            const select = document.getElementById('search-channel');

            const channels = new Set(["一般", "網購", "餐飲"]);
            db.forEach(c => c.benefits?.forEach(b => channels.add(b.channel)));

            select.innerHTML = Array.from(channels).map(ch => `<option value="${ch}">${ch}</option>`).join('');
            runSearch();
        }

        function runSearch() {
            // 修復點 1： key 統一為 figma_wallet
            const db = JSON.parse(localStorage.getItem('figma_wallet')) || [];
            const resultsBox = document.getElementById('search-results');
            const targetChannel = document.getElementById('search-channel').value;
            const amt = parseFloat(document.getElementById('search-amt').value) || 0;

            if (db.length === 0) {
                resultsBox.innerHTML = `<div class="text-xs text-zinc-500 p-4 border border-zinc-800 rounded-xl">皮夾內尚無卡片！請前往新增卡片。</div>`;
                return;
            }

            // 修復點 5：多通路 benefits 比較排序邏輯
            const scored = db.map(card => {
                let matchedRate = 0;
                if (card.benefits) {
                    const target = card.benefits.find(b => b.channel === targetChannel);
                    if (target) {
                        matchedRate = target.rate;
                    } else {
                        const general = card.benefits.find(b => b.channel === "一般");
                        if (general) matchedRate = general.rate;
                    }
                }
                return { ...card, matchedRate };
            });

            // 依回饋率由大到小排序
            scored.sort((a, b) => b.matchedRate - a.matchedRate);

            resultsBox.innerHTML = scored.map((card, idx) => {
                const earn = Math.round(amt * (card.matchedRate / 100));
                const isTop = idx === 0;

                return `
                    <div class="bg-[#111422] p-4 rounded-xl border ${isTop ? 'border-orange-500/50 shadow-[0_0_15px_rgba(249,115,22,0.15)]' : 'border-zinc-800'} flex justify-between items-center">
                        <div class="flex flex-col">
                            <div class="flex items-center gap-1.5">
                                <span class="text-sm font-bold text-white">${card.name}</span>
                                ${isTop ? '<span class="bg-orange-500/20 text-orange-400 text-[9px] px-1.5 py-0.5 rounded font-bold">最高</span>' : ''}
                            </div>
                            <span class="text-[10px] text-zinc-500">支付: ${card.payTool || '通用'}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-black text-[#00F3A2]">+ NT$ ${earn}</div>
                            <div class="text-[10px] text-zinc-400">${targetChannel} ${card.matchedRate}%</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        initSearchPage();
    </script>
</body>
</html>
