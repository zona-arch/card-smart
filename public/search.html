<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardgini - Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#020205] flex justify-center items-center min-h-screen p-4">

    <div class="w-[393px] h-[852px] rounded-[44px] bg-gradient-to-b from-[#0B0E14] to-[#110A25] text-white overflow-hidden shadow-2xl relative flex flex-col border border-white/10">
        
        <!-- HEADER -->
        <header class="flex w-[393px] pt-6 px-6 pb-4 justify-between items-center bg-[#0C0E15]/40 backdrop-blur-[5px] sticky top-0 z-50 border-b border-white/5">
            <div class="flex flex-col gap-1">
                <img src="logo.png" alt="Cardgini Logo" class="w-[111px] h-[24px] object-contain">
                <span class="text-[12px] text-[#8A99AD]">Smart Spending, Elite Saving</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 flex flex-col gap-4 pt-3">
            <section class="px-4">
                <div class="bg-[#161E2E]/60 h-12 px-4 rounded-xl border border-white/5 flex items-center gap-3">
                    <i data-lucide="search" class="w-5 h-5 text-[#8A99AD]"></i>
                    <input type="text" placeholder="搜尋店家、通路類別..." class="bg-transparent text-sm text-white placeholder-[#8A99AD] w-full focus:outline-none">
                </div>
            </section>

            <section class="px-4 flex flex-col gap-2.5">
                <span class="text-xs font-semibold text-[#8A99AD] px-2">常用推薦</span>
                <div class="bg-[#161E2E]/60 p-4 rounded-xl border border-white/5 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i data-lucide="shopping-bag" class="text-orange-500 w-5 h-5"></i>
                        <span class="text-sm font-medium">蝦皮購物</span>
                    </div>
                    <span class="text-xs text-emerald-400 font-bold">最高 3% 回饋</span>
                </div>
            </section>
        </div>

        <!-- ─── 核心功能 FOOTER (搜尋頁高亮) ─── -->
        <footer class="flex h-[72px] px-4 justify-between items-center bg-[#161E2E]/80 backdrop-blur-[10px] border-t border-white/5 sticky bottom-0 z-50">
            <!-- 1. Overview -->
            <button onclick="window.location.href='index.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] hover:text-white transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Overview</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <!-- 2. Search (目前頁面：橘色高亮) -->
            <button onclick="window.location.href='search.html'" class="flex w-[72px] flex-col items-center gap-1 text-orange-500">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-[10px] font-semibold">Search</span>
                <div class="w-4 h-[2px] bg-orange-500 rounded-full"></div>
            </button>
            <!-- 3. Cards -->
            <button onclick="window.location.href='cards.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] hover:text-white transition-colors">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Cards</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <!-- 4. 暫未開放功能 -->
            <button class="flex w-[72px] flex-col items-center gap-1 text-zinc-600 cursor-not-allowed" disabled>
                <i data-lucide="landmark" class="w-5 h-5"></i>
                <span class="text-[10px]">Rates</span>
            </button>
            <button class="flex w-[72px] flex-col items-center gap-1 text-zinc-600 cursor-not-allowed" disabled>
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[10px]">Settings</span>
            </button>
        </footer>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
