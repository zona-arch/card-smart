<div class="min-h-screen bg-surface-bg text-surface-on-primary p-6 font-sans">
  <!-- 搜尋頂欄 -->
  <div class="max-w-4xl mx-auto mb-8">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <!-- 搜尋 Logo 區塊 -->
        <div class="w-8 h-8 flex items-center justify-center text-selected-bg-from">
          <!-- 💡 這裡替換成妳從 Figma 導出的 Search Logo SVG -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
          </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-wide bg-gradient-to-r from-selected-bg-from to-selected-bg-to bg-clip-text text-transparent">
          搜尋遊戲
        </h1>
      </div>
    </div>

    <!-- 搜尋輸入框 -->
    <div class="relative">
      <input 
        type="text" 
        id="game-search"
        placeholder="輸入遊戲名稱或關鍵字..." 
        class="w-full bg-table-form-bg text-table-form-on-primary placeholder-placeholder-on-minor pl-12 pr-4 py-3.5 rounded-xl border border-placeholder-normal focus:outline-none focus:border-selected-bg-to focus:ring-1 focus:ring-selected-bg-to transition-all"
      />
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-placeholder-on-minor">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
        </svg>
      </span>
    </div>
  </div>

  <!-- 熱門標籤 / 推薦店家 -->
  <div class="max-w-4xl mx-auto mb-10">
    <h3 class="text-sm font-semibold text-surface-on-minor uppercase tracking-wider mb-3">熱門推薦</h3>
    <div class="flex flex-wrap gap-2.5" id="tag-container">
      <button class="px-4 py-2 rounded-lg text-sm font-medium bg-gradient-to-r from-selected-bg-from to-selected-bg-to text-selected-on transition-all shadow-md">
        全部遊戲
      </button>
      <button class="px-4 py-2 rounded-lg text-sm font-medium bg-table-form-bg text-table-form-on-minor hover:bg-table-form-hover hover:text-table-form-on-primary transition-all">
        CardGini 嚴選
      </button>
      <button class="px-4 py-2 rounded-lg text-sm font-medium bg-table-form-bg text-table-form-on-minor hover:bg-table-form-hover hover:text-table-form-on-primary transition-all">
        高爆擊率
      </button>
      <button class="px-4 py-2 rounded-lg text-sm font-medium bg-table-form-bg text-table-form-on-minor hover:bg-table-form-hover hover:text-table-form-on-primary transition-all">
        最新上架
      </button>
    </div>
  </div>

  <!-- 遊戲結果網格 -->
  <div class="max-w-4xl mx-auto">
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" id="game-grid">
      
      <!-- 遊戲卡片 1 (範例：帶有 Hot 標籤) -->
      <div class="group bg-primary-bg rounded-xl overflow-hidden border border-placeholder-normal hover:border-selected-bg-to transition-all duration-300 flex flex-col cursor-pointer" data-tags="全部遊戲,CardGini 嚴選,高爆擊率">
        <div class="relative aspect-[4/3] bg-neutral-800 overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent z-10"></div>
          <!-- 標籤套用 icontag.hot 的漸層色 -->
          <span class="absolute top-2 left-2 z-20 px-2 py-0.5 text-[10px] font-bold uppercase rounded bg-gradient-to-r from-icontag-hot-bg-from to-icontag-hot-bg-to text-icontag-hot-on-primary shadow">
            HOT
          </span>
          <div class="absolute bottom-2 right-2 z-20 bg-jackpot-bg/80 backdrop-blur-sm px-2 py-0.5 rounded text-[11px] font-mono text-jackpot-on-highlight font-bold">
            97.8% RTP
          </div>
        </div>
        <div class="p-3 flex-1 flex flex-col justify-between">
          <h4 class="font-medium text-primary-on-primary text-sm line-clamp-1 group-hover:text-selected-bg-from transition-colors">
            宙斯之雷霆
          </h4>
          <p class="text-xs text-primary-on-minor mt-1">Pragmatic Play</p>
        </div>
      </div>

      <!-- 遊戲卡片 2 (範例：帶有 New 標籤) -->
      <div class="group bg-primary-bg rounded-xl overflow-hidden border border-placeholder-normal hover:border-selected-bg-to transition-all duration-300 flex flex-col cursor-pointer" data-tags="全部遊戲,最新上架">
        <div class="relative aspect-[4/3] bg-neutral-800 overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent z-10"></div>
          <!-- 標籤套用 icontag.new 的漸層色 -->
          <span class="absolute top-2 left-2 z-20 px-2 py-0.5 text-[10px] font-bold uppercase rounded bg-gradient-to-r from-icontag-new-bg-from to-icontag-new-bg-to text-icontag-new-on-primary shadow">
            NEW
          </span>
          <div class="absolute bottom-2 right-2 z-20 bg-jackpot-bg/80 backdrop-blur-sm px-2 py-0.5 rounded text-[11px] font-mono text-jackpot-on-highlight font-bold">
            96.5% RTP
          </div>
        </div>
        <div class="p-3 flex-1 flex flex-col justify-between">
          <h4 class="font-medium text-primary-on-primary text-sm line-clamp-1 group-hover:text-selected-bg-from transition-colors">
            糖果繽紛樂
          </h4>
          <p class="text-xs text-primary-on-minor mt-1">Pocket Games Soft</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- 互動邏輯 JavaScript -->
<script>
  document.getElementById('game-search').addEventListener('input', function(e) {
    const keyword = e.target.value.toLowerCase();
    const cards = document.querySelectorAll('#game-grid > div');
    
    cards.forEach(card => {
      const title = card.querySelector('h4').textContent.toLowerCase();
      const provider = card.querySelector('p').textContent.toLowerCase();
      if (title.includes(keyword) || provider.includes(keyword)) {
        card.style.display = 'flex';
      } else {
        card.style.display = 'none';
      }
    });
  });
</script>
