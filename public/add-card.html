<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardgini - Add Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#020205] flex justify-center items-center min-h-screen p-4">

    <div class="w-[393px] h-[852px] rounded-[44px] bg-gradient-to-b from-[#0B0E14] to-[#110A25] text-white overflow-hidden shadow-2xl relative flex flex-col border border-white/10">
        
        <!-- HEADER -->
        <header class="flex w-[393px] pt-6 px-6 pb-4 justify-between items-center bg-[#0C0E15]/40 backdrop-blur-[5px] sticky top-0 z-50 border-b border-white/5">
            <div class="flex flex-col gap-1">
                <img src="logo.png" alt="Cardgini Logo" class="w-[111px] h-[24px] object-contain">
                <span class="text-[12px] text-[#8A99AD]">Smart Spending, Elite Saving</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 flex flex-col gap-[22px] pt-3 px-6">
            <h1 class="text-xl font-bold text-white mt-2">新增實體卡片</h1>

            <!-- 輸入表單 -->
            <div class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-zinc-400">卡片名稱</label>
                    <input type="text" id="card-name" placeholder="例如：富邦 J 卡、國泰 CUBE" class="bg-[#1A1A24] h-11 px-4 rounded-xl border border-[#2A2235] text-sm text-white focus:outline-none focus:border-orange-500/40">
                </div>

                <!-- 發卡組織 (單選) -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-zinc-400">發卡組織</label>
                    <div class="flex gap-2 w-full">
                        <div onclick="setOrg(this, 'Visa')" class="org-btn flex-1 bg-[#1A1A24] py-2.5 rounded-full border border-orange-500 text-center text-sm font-bold text-white shadow-[0_0_8px_rgba(255,131,0,0.2)] cursor-pointer">Visa</div>
                        <div onclick="setOrg(this, 'Mastercard')" class="org-btn flex-1 bg-[#1A1A24] py-2.5 rounded-full border border-[#2A2235] text-center text-sm font-medium text-[#8A99AD] cursor-pointer">Mastercard</div>
                        <div onclick="setOrg(this, 'JCB')" class="org-btn flex-1 bg-[#1A1A24] py-2.5 rounded-full border border-[#2A2235] text-center text-sm font-medium text-[#8A99AD] cursor-pointer">JCB</div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-zinc-400">基本一般消費回饋率 (%)</label>
                    <input type="number" id="card-rate" placeholder="例如：輸入 3 代表 3%" step="0.1" value="1.5" class="bg-[#1A1A24] h-11 px-4 rounded-xl border border-[#2A2235] text-sm text-white focus:outline-none focus:border-orange-500/40">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-zinc-400">指定通路（大腦比對關鍵字，多筆用逗號隔開）</label>
                    <input type="text" id="card-keywords" placeholder="例如：蝦皮, 網購, 日本" class="bg-[#1A1A24] h-11 px-4 rounded-xl border border-[#2A2235] text-sm text-white focus:outline-none focus:border-orange-500/40">
                </div>

                <!-- 按鈕群 -->
                <div class="flex gap-3 pt-4">
                    <button onclick="window.location.href='cards.html'" class="flex-1 bg-white/5 py-3 rounded-xl border border-white/20 text-center text-sm font-semibold">取消</button>
                    <button onclick="submitCard()" class="flex-1 bg-gradient-to-r from-teal-400 to-purple-600 py-3 rounded-xl text-center text-sm font-bold text-white shadow-[0_4px_12px_rgba(0,245,212,0.3)]">儲存卡片</button>
                </div>
            </div>
        </div>

        <!-- FOOTER NAV -->
        <footer class="flex h-[72px] px-4 justify-between items-center bg-[#161E2E]/80 backdrop-blur-[10px] border-t border-white/5 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[10px]">Overview</span></button>
            <button onclick="window.location.href='search.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD]"><i data-lucide="search" class="w-5 h-5"></i><span class="text-[10px]">Search</span></button>
            <button onclick="window.location.href='cards.html'" class="flex w-[72px] flex-col items-center gap-1 text-orange-500"><i data-lucide="credit-card" class="w-5 h-5"></i><span class="text-[10px] font-semibold">Cards</span></button>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        let currentOrg = "Visa";

        function setOrg(el, org) {
            document.querySelectorAll('.org-btn').forEach(btn => {
                btn.className = "org-btn flex-1 bg-[#1A1A24] py-2.5 rounded-full border border-[#2A2235] text-center text-sm font-medium text-[#8A99AD] cursor-pointer";
                btn.style.boxShadow = "none";
            });
            el.className = "org-btn flex-1 bg-[#1A1A24] py-2.5 rounded-full border border-orange-500 text-center text-sm font-bold text-white cursor-pointer";
            el.style.boxShadow = "0 0 8px rgba(255, 131, 0, 0.2)";
            currentOrg = org;
        }

        function submitCard() {
            const name = document.getElementById('card-name').value.trim();
            const rate = parseFloat(document.getElementById('card-rate').value) || 0;
            const keywordsText = document.getElementById('card-keywords').value;
            
            if(!name) { alert('請填寫卡片名稱！'); return; }

            // 將關鍵字切成陣列並去除空格
            const keywords = keywordsText.split(/[,，]/).map(k => k.trim()).filter(k => k.length > 0);

            const newCard = {
                id: Date.now(),
                name: name,
                org: currentOrg,
                rate: rate,
                keywords: keywords
            };

            const localCards = JSON.parse(localStorage.getItem('smart_cards')) || [];
            localCards.push(newCard);
            localStorage.setItem('smart_cards', JSON.stringify(localCards));

            window.location.href = 'cards.html';
        }
    </script>
</body>
</html>
