<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardgini - Add Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#020205] flex justify-center items-center min-h-screen p-4">

    <div class="w-[393px] h-[852px] rounded-[44px] bg-gradient-to-b from-[#0B0E14] to-[#110A25] text-white overflow-hidden shadow-2xl relative flex flex-col border border-white/10">
        
        <!-- HEADER -->
        <header class="flex w-[393px] pt-6 px-6 pb-4 justify-between items-center bg-[#0C0E15]/40 backdrop-blur-[5px] sticky top-0 z-50 border-b border-white/5">
            <div class="flex flex-col gap-1">
                <img src="logo.png" alt="Cardgini Logo" class="w-[111px] h-[24px] object-contain">
                <span class="text-[12px] text-[#8A99AD]">Smart Spending, Elite Saving</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-24 flex flex-col gap-5 p-6">
            <h1 class="text-lg font-bold text-white">手動新增卡片</h1>
            
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-zinc-400">卡片名稱</label>
                <input type="text" placeholder="輸入銀行與卡片名稱..." class="bg-[#1A1A24] h-11 px-4 rounded-xl border border-[#2A2235] text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-orange-500/40">
            </div>

            <!-- 取消 / 儲存按鈕，皆引導回卡片包 -->
            <div class="flex gap-3 pt-4">
                <button onclick="window.location.href='cards.html'" class="flex-1 bg-white/5 py-3 rounded-xl border border-white/20 text-center text-sm font-semibold text-white/80 active:scale-95 transition-transform">取消</button>
                <button onclick="window.location.href='cards.html'" class="flex-1 bg-gradient-to-r from-teal-400 to-purple-600 py-3 rounded-xl text-center text-sm font-bold text-white shadow-[0_4px_12px_rgba(0,245,212,0.3)] active:scale-95 transition-transform">儲存卡片</button>
            </div>
        </div>

        <!-- ─── 核心功能 FOOTER (隸屬於 Cards 分類，因此維持 Cards 高亮) ─── -->
        <footer class="flex h-[72px] px-4 justify-between items-center bg-[#161E2E]/80 backdrop-blur-[10px] border-t border-white/5 sticky bottom-0 z-50">
            <!-- 1. Overview -->
            <button onclick="window.location.href='index.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] hover:text-white transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Overview</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <!-- 2. Search -->
            <button onclick="window.location.href='search.html'" class="flex w-[72px] flex-col items-center gap-1 text-[#8A99AD] hover:text-white transition-colors">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-[10px] font-medium">Search</span>
                <div class="w-4 h-[2px] bg-transparent rounded-full"></div>
            </button>
            <!-- 3. Cards (高亮) -->
            <button onclick="window.location.href='cards.html'" class="flex w-[72px] flex-col items-center gap-1 text-orange-500">
                <i data-lucide="credit-card" class="w-5 h-5"></i>
                <span class="text-[10px] font-semibold">Cards</span>
                <div class="w-4 h-[2px] bg-orange-500 rounded-full"></div>
            </button>
            <!-- 4. 暫未開放功能 -->
            <button class="flex w-[72px] flex-col items-center gap-1 text-zinc-600 cursor-not-allowed" disabled>
                <i data-lucide="landmark" class="w-5 h-5"></i>
                <span class="text-[10px]">Rates</span>
            </button>
            <button class="flex w-[72px] flex-col items-center gap-1 text-zinc-600 cursor-not-allowed" disabled>
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[10px]">Settings</span>
            </button>
        </footer>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
