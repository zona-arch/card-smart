<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardGini - Add Credit Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #020205; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-bg { background: linear-gradient(180deg, #0C0E14 0%, #0E0B1E 50%, #07050F 100%); }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-2 select-none">

    <div class="w-[393px] h-[852px] rounded-[50px] app-bg text-white overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.8)] relative flex flex-col border border-zinc-800">
        
        <!-- HEADER -->
        <header class="flex w-full pt-6 px-6 pb-3 justify-between items-center bg-[#0C0E15]/60 backdrop-blur-md sticky top-0 z-40">
            <div class="flex flex-col">
                <div class="flex items-baseline gap-0.5">
                    <span class="text-2xl font-extrabold text-orange-500 tracking-wide">C</span>
                    <span class="text-xl font-bold text-white tracking-wide -ml-0.5">ardGini</span>
                </div>
                <span class="text-[10px] text-[#5A6E85] tracking-wider font-medium mt-0.5">Smart Spending, Elite Saving</span>
            </div>
            <div class="w-9 h-9 rounded-full border border-orange-400/40 bg-[#FFF9E6] overflow-hidden flex items-center justify-center shadow-lg">
                <span class="text-lg">⚡️</span>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-6 pb-28 pt-2 flex flex-col gap-4">
            
            <!-- 卡片上傳區 -->
            <section class="flex flex-col items-center justify-center mt-1">
                <input type="file" id="card-image-input" accept="image/*" class="hidden" onchange="previewCardImage(this)">
                <div onclick="document.getElementById('card-image-input').click()" id="upload-box" class="w-full h-[140px] rounded-2xl border border-dashed border-zinc-700 bg-[#12121A]/60 flex flex-col justify-center items-center gap-2 cursor-pointer hover:border-orange-500/50 transition-all group relative overflow-hidden">
                    <div id="upload-placeholder" class="flex flex-col items-center gap-2 text-center">
                        <i data-lucide="camera" class="w-6 h-6 text-zinc-500 group-hover:text-orange-500 transition-colors"></i>
                        <span class="text-xs text-zinc-400 font-medium">點擊拍攝或上傳實體卡面</span>
                    </div>
                    <img id="card-preview-img" class="absolute inset-0 w-full h-full object-cover hidden">
                </div>
            </section>

            <!-- 基本欄位 -->
            <section class="flex flex-col gap-1.5">
                <label class="text-xs font-bold text-zinc-300">卡片名稱</label>
                <input type="text" id="inp-name" placeholder="例如：國泰 CUBE 卡" class="w-full bg-[#14141F] h-10 px-4 rounded-xl border border-zinc-800 text-sm text-white placeholder-zinc-600 focus:outline-none">
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-zinc-300">發卡組織</label>
                    <select id="inp-org" class="w-full bg-[#14141F] h-10 px-3 rounded-xl border border-zinc-800 text-sm text-white focus:outline-none">
                        <option value="Visa">Visa</option>
                        <option value="Mastercard">Mastercard</option>
                        <option value="JCB">JCB</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-zinc-300">支付工具</label>
                    <select id="inp-pay-tool" class="w-full bg-[#14141F] h-10 px-3 rounded-xl border border-zinc-800 text-sm text-white focus:outline-none">
                        <option value="Line Pay">Line Pay</option>
                        <option value="Apple Pay">Apple Pay</option>
                        <option value="街口支付">街口支付</option>
                        <option value="Google Pay">Google Pay</option>
                    </select>
                </div>
            </section>

            <section class="flex flex-col gap-1.5">
                <label class="text-xs font-bold text-zinc-300">刷卡上限 / 月 (NT$)</label>
                <input type="number" id="inp-limit" placeholder="例如: 50000" class="w-full bg-[#14141F] h-10 px-3 rounded-xl border border-zinc-800 text-sm text-white focus:outline-none">
            </section>

            <!-- 動態多通路權益 -->
            <section class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-bold text-zinc-300">通路權益 (最多 5 組)</label>
                    <button type="button" onclick="addBenefitRow()" class="text-xs text-orange-400 hover:text-orange-300 font-bold">+ 新增通路</button>
                </div>
                <div id="benefits-container" class="flex flex-col gap-2">
                    <!-- 動態生成區 -->
                </div>
            </section>

            <!-- 權益方案備忘錄 -->
            <section class="flex flex-col gap-1">
                <label class="text-xs font-bold text-zinc-300">備註說明</label>
                <textarea id="inp-memo" placeholder="額外注意事項備忘..." class="w-full bg-[#0D0D15] h-16 p-3 rounded-xl border border-zinc-800 text-xs text-white placeholder-zinc-700 focus:outline-none resize-none"></textarea>
            </section>

            <!-- 按鈕操控組 -->
            <div class="flex gap-4 pt-1">
                <button onclick="window.location.href='cards.html'" class="flex-1 bg-[#14141F] py-3 rounded-xl border border-zinc-800 text-center text-sm font-bold text-zinc-400">取消</button>
                <button onclick="saveFigmaCard()" class="flex-1 bg-gradient-to-r from-[#00F0FF] via-[#7000FF] to-[#FF00F5] py-3 rounded-xl text-center text-sm font-black text-white shadow-[0_4px_20px_rgba(112,0,255,0.4)]">儲存卡片</button>
            </div>
        </div>

        <!-- FOOTER NAV -->
        <footer class="flex h-[76px] px-2 justify-between items-center bg-[#07050F]/95 backdrop-blur-xl border-t border-zinc-900 sticky bottom-0 z-50">
            <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="home" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Overview</span></button>
            <button onclick="window.location.href='search.html'" class="flex flex-col items-center gap-1 w-16 text-[#5A6E85]"><i data-lucide="search" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Search</span></button>
            <button onclick="window.location.href='cards.html'" class="flex flex-col items-center gap-1 w-16 text-orange-500"><i data-lucide="credit-card" class="w-[22px] h-[22px]"></i><span class="text-[9px] font-bold">Credit Cards</span><div class="w-4 h-[2px] bg-orange-500 rounded-full mt-0.5"></div></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="landmark" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Bank Rate</span></button>
            <button class="flex flex-col items-center gap-1 w-16 text-zinc-700 cursor-not-allowed" disabled><i data-lucide="settings" class="w-[22px] h-[22px]"></i><span class="text-[9px]">Settings</span></button>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        let uploadedImageBase64 = "";

        // 預設給一組通路權益輸入框
        window.onload = () => {
            addBenefitRow("一般", 1);
            addBenefitRow("網購", 3);
        };

        function addBenefitRow(defaultChannel = "", defaultRate = "") {
            const container = document.getElementById('benefits-container');
            if (container.children.length >= 5) {
                alert('最多新增 5 組通路權益！');
                return;
            }

            const row = document.createElement('div');
            row.className = "flex gap-2 items-center benefit-row";
            row.innerHTML = `
                <input type="text" placeholder="通路(例: 餐飲/網購)" value="${defaultChannel}" class="flex-1 bg-[#14141F] h-9 px-3 rounded-lg border border-zinc-800 text-xs text-white focus:outline-none channel-input">
                <div class="flex items-center gap-1 bg-[#14141F] h-9 px-2 rounded-lg border border-zinc-800 w-24">
                    <input type="number" step="0.1" placeholder="3" value="${defaultRate}" class="w-full bg-transparent text-xs text-white focus:outline-none text-right rate-input">
                    <span class="text-xs text-zinc-400">%</span>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="text-zinc-600 hover:text-rose-400 p-1"><i data-lucide="x" class="w-4 h-4"></i></button>
            `;
            container.appendChild(row);
            lucide.createIcons();
        }

        function previewCardImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('card-preview-img').src = e.target.result;
                    document.getElementById('card-preview-img').classList.remove('hidden');
                    document.getElementById('upload-placeholder').classList.add('hidden');
                    uploadedImageBase64 = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveFigmaCard() {
            const name = document.getElementById('inp-name').value.trim();
            const org = document.getElementById('inp-org').value;
            const payTool = document.getElementById('inp-pay-tool').value;
            const limit = document.getElementById('inp-limit').value || "50000";
            const memo = document.getElementById('inp-memo').value;

            if (!name) { alert('請輸入卡片名稱！'); return; }

            // 收集多組通路權益
            const benefits = [];
            document.querySelectorAll('.benefit-row').forEach(row => {
                const channel = row.querySelector('.channel-input').value.trim();
                const rate = parseFloat(row.querySelector('.rate-input').value) || 0;
                if (channel) {
                    benefits.push({ channel, rate });
                }
            });

            if (benefits.length === 0) {
                alert('請至少填寫一組通路權益！');
                return;
            }

            const figmaCard = {
                id: Date.now(),
                name,
                org,
                payTool,
                limit: parseFloat(limit).toLocaleString(),
                memo,
                benefits,
                image: uploadedImageBase64 || "default"
            };

            // 統一 key: figma_wallet
            const db = JSON.parse(localStorage.getItem('figma_wallet')) || [];
            db.push(figmaCard);
            localStorage.setItem('figma_wallet', JSON.stringify(db));

            window.location.href = 'cards.html';
        }
    </script>
</body>
</html>
